<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Certo ou Errado? - Profª Adriana</title>
    <style>
        body { font-family: 'Comic Sans MS', sans-serif; text-align: center; background-color: #f0f4f8; color: #2c3e50; padding: 20px; }
        h1 { color: #2980b9; margin-top: 10px; }
        .instrucao { font-size: 1.3rem; margin-bottom: 30px; color: #7f8c8d; }
        
        .game-container { display: flex; flex-direction: column; align-items: center; gap: 25px; max-width: 500px; margin: 0 auto; }
        
        .opcao {
            background: white; border: 6px solid #dee2e6; border-radius: 25px;
            padding: 30px; width: 100%; cursor: pointer; transition: 0.2s;
            display: flex; justify-content: center; align-items: center; 
            font-size: 60px; position: relative; overflow: hidden;
        }
        /* Efeito de seleção visual simples */
        .opcao:active { transform: scale(0.95); background-color: #ebf5fb; }
        .selecionada { border-color: #3498db; background-color: #ebf5fb; }

        footer { margin-top: 60px; padding: 20px; border-top: 2px solid #3498db; color: #2980b9; font-size: 14px; font-weight: bold; }

        /* Modal Final */
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10; }
        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
                 background: white; padding: 40px; border-radius: 35px; border: 10px solid #2ecc71; z-index: 11; text-align: center; min-width: 320px; }
    </style>
</head>
<body>

    <h1 id="tituloGeral">🤔 QUAL A ORDEM CORRETA?</h1>
    <p class="instrucao" id="subtitulo">Clique na sequência que faz sentido!</p>

    <div class="game-container" id="game-box">
        </div>

    <footer>
        Desenvolvido pela Profª Adriana Bett Terebinto <br>
        São Lourenço do Oeste - SC | Pensamento Computacional - BNCC: EF01CO02
    </footer>

    <div id="overlay"></div>
    <div id="modal">
        <div id="resultadoEmoji" style="font-size: 80px;">🏆</div>
        <h2 id="resultadoTitulo" style="color: #27ae60; font-size: 35px;">FIM DO DESAFIO!</h2>
        <p id="resultadoTexto" style="font-size: 20px; font-weight: bold;">Sua pontuação foi:</p>
        <div id="alertNota" style="font-size: 60px; color: #2ecc71; margin: 20px 0; font-weight: bold;">NOTA: 0</div>
        <button onclick="location.reload()" style="padding: 15px 40px; border-radius: 50px; border: none; background: #2ecc71; color: white; font-size: 18px; font-weight: bold; cursor: pointer;">RECOMEÇAR</button>
    </div>

    <script>
        const fases = [
            { certa: "🧦 ➔ 👟", errada: "👟 ➔ 🧦" },
            { certa: "🚿 ➔ 👕", errada: "👕 ➔ 🚿" },
            { certa: "🍌 ➔ 🗑️", errada: "🗑️ ➔ 🍌" },
            { certa: "✏️ ➔ 📄", errada: "📄 ➔ ✏️" },
            { certa: "🥚 ➔ 🍳", errada: "🍳 ➔ 🥚" }
        ];

        let faseAtual = 0;
        let acertos = 0;

        function carregarFase() {
            if (faseAtual >= fases.length) {
                finalizarERecuperarNota();
                return;
            }

            const box = document.getElementById('game-box');
            box.innerHTML = '';
            const dados = fases[faseAtual];

            const opcoes = [
                { texto: dados.certa, correta: true },
                { texto: dados.errada, correta: false }
            ].sort(() => Math.random() - 0.5);

            opcoes.forEach(opt => {
                const div = document.createElement('div');
                div.className = 'opcao';
                div.innerText = opt.texto;
                div.onclick = () => {
                    // Se clicar, registra se acertou e pula para a próxima sem avisar nada
                    if (opt.correta) { acertos++; }
                    faseAtual++;
                    // Pequeno delay para a criança ver o clique
                    setTimeout(carregarFase, 300);
                };
                box.appendChild(div);
            });
        }

        function finalizarERecuperarNota() {
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('modal').style.display = 'block';
            
            const notaFinal = acertos * 2; // Como são 5 fases, cada uma vale 2 pontos (Total 10)
            const campoNota = document.getElementById('alertNota');
            const campoEmoji = document.getElementById('resultadoEmoji');
            const campoTexto = document.getElementById('resultadoTexto');

            campoNota.innerText = "NOTA: " + notaFinal;

            if (notaFinal === 10) {
                campoEmoji.innerText = "🏆";
                campoTexto.innerText = "EXCELENTE! VOCÊ ACERTOU TUDO!";
            } else if (notaFinal >= 6) {
                campoEmoji.innerText = "👍";
                campoTexto.innerText = "MUITO BEM! QUASE LÁ!";
                document.getElementById('modal').style.borderColor = "#f1c40f";
            } else {
                campoEmoji.innerText = "🎈";
                campoTexto.innerText = "CONTINUE TREINANDO!";
                document.getElementById('modal').style.borderColor = "#e67e22";
            }
        }

        carregarFase();
    </script>
</body>
</html>
